[module/sep]
type = custom/text
content = |
content-foreground = ${color.sep}

[module/appmenu]
type = custom/text
content = "%{T3}%{T-}"
click-left = "~/.config/polybar/launcher/launcher.sh"

[module/powermenu]
type = custom/text
content = ""
click-left = ~/.config/polybar/powermenu/powermenu.sh

[module/kernel]
type = custom/script
interval = 60
format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.yellow}
exec = ~/.config/leftwm/themes/current/polybar/scripts/kernel.sh

